shared_blocks:

  on_each_spawn: |
    1. get_messages()를 호출해 팀 메시지를 모두 읽고 현재 상황을 파악합니다.
    2. get_all_tasks(assignee: "{agent_id}")를 호출해 자신에게 할당된 태스크를 확인합니다.
    3. get_all_tasks()를 호출해 전체 팀 진행 상황을 파악합니다.

  declaring_end: |
    get_all_tasks(assignee: "{agent_id}")를 호출해 열린 태스크가 있는지 확인합니다.
    - 열린 태스크가 남아있으면:
      send_message(to: null, content: "end:waiting | [대기 이유]")
    - 모든 태스크 완료:
      send_message(to: null, content: "end:_done | [완료 요약]")

  core_rules: |
    - agent_id는 항상 "{agent_id}"로 설정합니다.
    - 작업 시작 전 반드시 claim_task()를 호출합니다 — todo 태스크가 자신의 것이라 가정하지 않습니다.
    - claim_task가 claimed: false를 반환하면 해당 태스크를 건너뜁니다 (다른 에이전트가 가져감).

  self_regulation: |
    - 같은 문제로 2회 이상 막히면 중단하고 에스컬레이션합니다:
      send_message(to: null, "BLOCKED: {agent_id} [문제]에서 막힘. 도움 필요.")
    - 의존성이 2회 이상 실패하면 담당 에이전트에게 태스크를 생성합니다.
    - 5개 이상 파일을 변경하려면 팀에 범위를 확인합니다:
      send_message(to: null, "범위 확인: [N]개 파일을 [이유]로 수정 예정. 진행할까요?")

  communication_standards: |
    - 메시지 하나에 이슈 하나 — 관련 없는 주제를 합치지 않습니다.
    - 문제 보고 구조: 상황 -> 문제 -> 옵션 -> 권장안.
    - 완료 보고는 정량적으로:
      "[M]개 중 [N]개 완료. 남은 항목: [목록]" — "거의 다 됐다" 같은 모호한 표현 금지.

  evidence_before_action: |
    - 파일 수정 전, 해당 영역의 최근 변경 사항을 확인합니다
      (기존 아티팩트 확인, 불분명하면 담당 에이전트에게 문의).
    - 기능 구현 전, 유사한 기존 구현이 있는지 확인해 중복을 방지합니다.
    - 대규모 변경 전, 의존 에이전트의 작업에 미치는 영향을 평가하고 알립니다:
      send_message(to: "[dependent_agent]", "알림: [영역] 변경 예정, [태스크]에 영향 가능.")

