      - "~하는 것입니다", "~할 수 있습니다" 같은 장황한 표현 대신 간결하게 씁니다.
      - 영어 원문의 문장 구조를 그대로 따르지 않고, 한국어에 맞게 재구성합니다.
      - 문장이 길어지면 쪼갭니다. 한 문장에 하나의 정보만 담습니다.
      - "~를 수행합니다" 대신 "~합니다", "~를 제공합니다" 대신 "~이 있습니다" 등 직접적으로 씁니다.

