# yaml-language-server: $schema=https://custardcream98.github.io/relay/agents.schema.json
# agents.yml
# Customize agent personas freely in this file.
# Any fields not specified here fall back to agents.default.yml.
#
# Examples:
#
# 1. Override an existing agent's systemPrompt:
#   agents:
#     fe:
#       systemPrompt: |
#         You are a Next.js specialist FE engineer...
#
# 2. Disable an existing agent:
#   agents:
#     designer:
#       disabled: true
#
# 3. Add a custom agent (inherit from an existing one via extends):
#   agents:
#     security-reviewer:
#       name: "Security Reviewer"
#       emoji: "🔐"
#       extends: "be"
#       systemPrompt: |
#         You are a security expert. Review from the OWASP Top 10 perspective...
#
# 4. Override a workflow job (e.g. split the QA loop into a hotfix job):
#   workflow:
#     jobs:
#       qa:
#         end:
#           deploy: "when all tests pass"
#           hotfix: "when a critical bug is found"
#       hotfix:
#         agents: [be]
#         description: "Emergency fix for critical bugs only."
#         end:
#           qa: "when the fix is complete and needs re-validation"
#
# 5. Set response language for all agents (global):
#   language: Korean
#
# 6. Use different languages per agent (per-agent override):
#   language: Korean      # global default
#   agents:
#     be:
#       language: English # BE responds in English only

agents: {}
