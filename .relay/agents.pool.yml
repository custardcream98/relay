review_checklist: |
  ## Review Checklist
  ### Code Quality
  - TypeScript `any` 타입 없음 (`unknown` + 타입 가드 사용)
  - console.log / debugger / TODO-hack 코멘트 잔여물 없음
  - 함수 50줄 이하; 파일 300줄 이하
  ### Correctness
  - 모든 async 코드 경로에 적절한 에러 처리 (try/catch 또는 .catch)
  - 엣지 케이스: 빈 배열, null/undefined, 경계값
  ### Architecture
  - 기존 프로젝트 패턴 준수 (유사 파일의 컨벤션 확인)
  - 순환 의존성 미도입

