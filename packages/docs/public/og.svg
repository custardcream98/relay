<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0D0A"/>
      <stop offset="100%" stop-color="#1E1A14"/>
    </linearGradient>
    <filter id="glow-blur"><feGaussianBlur stdDeviation="100"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="220" cy="315" rx="320" ry="220" fill="#E8A83A" opacity="0.07" filter="url(#glow-blur)"/>

  <!-- Grid -->
  <g stroke="#2A2318" stroke-width="1" opacity="0.4">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="308" font-family="monospace" font-size="112" font-weight="600" fill="#F0E8D8" letter-spacing="-3">relay_</text>

  <!-- Tagline -->
  <text x="84" y="368" font-family="monospace" font-size="21" fill="#A89880">Multi-agent framework for Claude Code</text>

  <!-- Divider -->
  <rect x="80" y="400" width="420" height="1" fill="#3D3428"/>

  <!-- Feature line -->
  <text x="84" y="430" font-family="monospace" font-size="15" fill="#6A5E50">peer-to-peer · event-driven · zero extra billing</text>

  <!-- Agent pills — right side, 2 columns -->
  <!-- Row 1 -->
  <rect x="730" y="160" width="160" height="52" rx="10" fill="#1E1A14" stroke="#3D3428" stroke-width="1.5"/>
  <circle cx="759" cy="186" r="8" fill="#C17F24"/>
  <text x="778" y="192" font-family="monospace" font-size="18" fill="#D4C9B8">PM</text>

  <rect x="910" y="160" width="200" height="52" rx="10" fill="#1E1A14" stroke="#3D3428" stroke-width="1.5"/>
  <circle cx="939" cy="186" r="8" fill="#A0522D"/>
  <text x="958" y="192" font-family="monospace" font-size="18" fill="#D4C9B8">Designer</text>

  <!-- Row 2 -->
  <rect x="730" y="228" width="160" height="52" rx="10" fill="#1E1A14" stroke="#3D3428" stroke-width="1.5"/>
  <circle cx="759" cy="254" r="8" fill="#4682B4"/>
  <text x="778" y="260" font-family="monospace" font-size="18" fill="#D4C9B8">FE</text>

  <rect x="910" y="228" width="160" height="52" rx="10" fill="#1E1A14" stroke="#3D3428" stroke-width="1.5"/>
  <circle cx="939" cy="254" r="8" fill="#2E8B57"/>
  <text x="958" y="260" font-family="monospace" font-size="18" fill="#D4C9B8">BE</text>

  <!-- Row 3 -->
  <rect x="730" y="296" width="160" height="52" rx="10" fill="#1E1A14" stroke="#3D3428" stroke-width="1.5"/>
  <circle cx="759" cy="322" r="8" fill="#8B4513"/>
  <text x="778" y="328" font-family="monospace" font-size="18" fill="#D4C9B8">QA</text>

  <rect x="910" y="296" width="200" height="52" rx="10" fill="#1E1A14" stroke="#E8A83A" stroke-width="1.5"/>
  <circle cx="939" cy="322" r="8" fill="#708090"/>
  <text x="958" y="328" font-family="monospace" font-size="18" fill="#E8A83A">Deployer</text>

  <!-- Command line at bottom right -->
  <rect x="730" y="380" width="380" height="80" rx="8" fill="#181410" stroke="#2A2318" stroke-width="1"/>
  <text x="754" y="414" font-family="monospace" font-size="14" fill="#E8A83A">$</text>
  <text x="772" y="414" font-family="monospace" font-size="14" fill="#F0E8D8">/relay:relay "add OAuth login"</text>
  <text x="754" y="438" font-family="monospace" font-size="12" fill="#4A4038"># all agents collaborate simultaneously</text>
</svg>
