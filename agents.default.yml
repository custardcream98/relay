# agents.default.yml
# relay framework defaults — shipped with the package.
# Do not modify this file directly.
#
# ┌─ How to configure your team ──────────────────────────────────────────────┐
# │                                                                            │
# │  Create agents.yml in your project root (or .relay/agents.yml for         │
# │  session-level overrides that are not committed to git).                  │
# │                                                                            │
# │  Minimum required fields per agent:                                        │
# │    name, emoji, tools, systemPrompt                                        │
# │                                                                            │
# │  See agents.example.yml for a complete web-dev team example.              │
# │  See https://relay.docs for more examples (research, marketing, legal).   │
# │                                                                            │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Available MCP tools an agent can use:
#   Communication:  send_message, get_messages
#   Tasks:          create_task, update_task, get_my_tasks, get_all_tasks,
#                   claim_task, get_team_status
#   Artifacts:      post_artifact, get_artifact
#   Reviews:        request_review, submit_review
#   Memory:         read_memory, write_memory, append_memory
#   Sessions:       save_session_summary, list_sessions, get_session_summary

agents: {}
